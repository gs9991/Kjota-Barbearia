<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<title>KJota Barbearia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--k-black:#0D0D0D;--k-dark:#1A1A1A;--k-card:#222;--k-border:#333;--k-gold:#C9A84C;--k-gold-dim:#8A6E2E;--k-cream:#F5F0E8;--k-muted:#888;--font-display:'Bebas Neue',sans-serif;--font-ui:'Inter',sans-serif;}
body{background:var(--k-black);color:var(--k-cream);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden;}
#splash{position:fixed;inset:0;background:#0D0D0D;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s;}
#splash.hide{opacity:0;pointer-events:none;visibility:hidden;}
#splash img{width:220px;height:220px;object-fit:contain;animation:pulse 1.8s ease-in-out infinite;}
#splash-txt{font-family:var(--font-display);font-size:13px;letter-spacing:4px;color:var(--k-gold);margin-top:1.2rem;opacity:.7;}
#splash-bar{width:150px;height:2px;background:var(--k-border);border-radius:2px;margin-top:.9rem;overflow:hidden;}
#splash-fill{height:100%;background:var(--k-gold);width:0%;transition:width .1s linear;}
@keyframes pulse{0%,100%{opacity:.85;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:1.5rem;position:relative;z-index:100;}
#login-screen.visible{display:flex;}
.login-box{width:100%;max-width:360px;background:var(--k-dark);border:1px solid var(--k-border);border-radius:16px;padding:2rem 1.75rem;position:relative;z-index:10;}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:1.75rem;gap:.6rem;}
.login-logo img{width:140px;height:140px;object-fit:contain;}
.login-logo-name{font-family:var(--font-display);font-size:28px;letter-spacing:4px;color:var(--k-gold);}
.login-logo-sub{font-size:11px;color:var(--k-muted);letter-spacing:2px;}
.login-title{font-size:13px;font-weight:600;color:var(--k-cream);margin-bottom:1.1rem;text-align:center;}
.form-group{margin-bottom:.85rem;}
.form-label{font-size:11px;color:var(--k-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--k-card);border:1px solid var(--k-border);border-radius:8px;padding:.6rem .85rem;color:var(--k-cream);font-family:var(--font-ui);font-size:13px;outline:none;transition:.2s;}
.form-input:focus{border-color:var(--k-gold);}
.form-input option{background:var(--k-dark);}
.pw-wrap{position:relative;}
.pw-wrap .form-input{padding-right:2.5rem;}
.pw-eye{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--k-muted);cursor:pointer;font-size:16px;padding:0;}
.pw-eye:hover{color:var(--k-gold);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:.6rem 1.1rem;border-radius:8px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;}
.btn-gold{background:var(--k-gold);color:#0D0D0D;width:100%;justify-content:center;margin-top:.5rem;}
.btn-gold:hover{background:#D9B85C;}
.btn-outline{background:transparent;color:var(--k-gold);border:1px solid var(--k-gold-dim);}
.btn-outline:hover{background:rgba(201,168,76,.08);}
.btn-danger{background:transparent;color:#CF6060;border:1px solid #8B1A1A;}
.btn-danger:hover{background:rgba(139,26,26,.15);}
.btn-sm{padding:.3rem .7rem;font-size:11px;}
.login-error{background:#2A0A0A;border:1px solid #8B1A1A;border-radius:8px;padding:.55rem .85rem;font-size:12px;color:#CF6060;margin-top:.75rem;display:none;}

#app{display:none;flex-direction:column;min-height:100vh;}
#app.visible{display:flex;}
.header{background:var(--k-dark);border-bottom:1px solid var(--k-border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:66px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-left img{width:52px;height:52px;object-fit:contain;}
.header-brand{font-family:var(--font-display);font-size:21px;letter-spacing:3px;color:var(--k-gold);}
.header-right{display:flex;align-items:center;gap:10px;}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--k-card);border:1px solid var(--k-border);border-radius:20px;padding:4px 12px 4px 6px;font-size:12px;color:var(--k-muted);}
.user-chip .av{width:24px;height:24px;border-radius:50%;background:var(--k-gold-dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--k-cream);font-family:var(--font-display);}
.user-chip .role{font-size:10px;color:var(--k-gold);font-weight:600;}
.logout-btn{background:none;border:none;color:var(--k-muted);cursor:pointer;font-size:18px;padding:4px;}
.logout-btn:hover{color:#CF6060;}
.nav{background:var(--k-dark);border-bottom:1px solid var(--k-border);display:flex;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;color:var(--k-muted);font-family:var(--font-ui);font-size:12px;font-weight:500;padding:12px 17px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s;}
.nav-btn:hover{color:var(--k-cream);}
.nav-btn.active{color:var(--k-gold);border-bottom-color:var(--k-gold);}
.nav-btn i{font-size:15px;}
.content{flex:1;padding:1.2rem;max-width:860px;margin:0 auto;width:100%;}
.section{display:none;}
.section.active{display:block;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:1.2rem;}
.kpi{background:var(--k-dark);border:1px solid var(--k-border);border-radius:10px;padding:.85rem 1rem;}
.kpi-label{font-size:11px;color:var(--k-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.kpi-value{font-family:var(--font-display);font-size:28px;color:var(--k-gold);}
.kpi-sub{font-size:11px;color:var(--k-muted);margin-top:3px;}
.section-title{font-family:var(--font-display);font-size:21px;letter-spacing:2px;color:var(--k-gold);margin-bottom:1rem;}
.card{background:var(--k-dark);border:1px solid var(--k-border);border-radius:10px;overflow:hidden;margin-bottom:1rem;}
.card-header{padding:.65rem 1rem;border-bottom:1px solid var(--k-border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--k-cream);}
.card-body{padding:.85rem 1rem;}
.agenda-item{display:flex;align-items:flex-start;gap:10px;padding:.65rem 0;border-bottom:1px solid var(--k-border);}
.agenda-item:last-child{border-bottom:none;}
.agenda-time{font-family:var(--font-display);font-size:16px;color:var(--k-gold);min-width:46px;}
.agenda-name{font-size:13px;font-weight:500;color:var(--k-cream);}
.agenda-svc{font-size:11px;color:var(--k-muted);margin-top:2px;}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.badge-wait{background:#2A2000;color:#C9A84C;}
.badge-done{background:#0A2A12;color:#5DBF78;}
.badge-cancel{background:#2A0A0A;color:#CF6060;}
.chip{display:inline-flex;align-items:center;gap:3px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--k-gold);font-size:10px;padding:1px 7px;border-radius:20px;}
.client-row{display:flex;align-items:center;gap:10px;padding:.6rem 0;border-bottom:1px solid var(--k-border);}
.client-row:last-child{border-bottom:none;}
.av{width:34px;height:34px;border-radius:50%;background:var(--k-gold-dim);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;color:var(--k-cream);flex-shrink:0;}
.cn{font-size:13px;font-weight:500;color:var(--k-cream);}
.cm{font-size:11px;color:var(--k-muted);margin-top:1px;}
.plan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:1rem;}
.plan-card{background:var(--k-dark);border:1px solid var(--k-border);border-radius:12px;padding:1.1rem;position:relative;}
.plan-card.featured{border-color:var(--k-gold);}
.plan-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--k-gold);color:#0D0D0D;font-size:10px;font-weight:700;padding:2px 12px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;}
.plan-name{font-family:var(--font-display);font-size:19px;letter-spacing:1px;color:var(--k-cream);margin-bottom:.2rem;}
.plan-price{font-family:var(--font-display);font-size:30px;color:var(--k-gold);line-height:1;}
.plan-period{font-size:11px;color:var(--k-muted);margin-bottom:.7rem;}
.plan-items{list-style:none;margin-bottom:.85rem;}
.plan-items li{font-size:12px;color:var(--k-muted);padding:2px 0;display:flex;align-items:center;gap:5px;}
.plan-items li i{color:var(--k-gold);font-size:12px;}
.itens-edit{display:flex;flex-direction:column;gap:6px;margin-bottom:.5rem;}
.item-edit-row{display:flex;gap:6px;align-items:center;}
.item-edit-row .form-input{flex:1;}
.fluxo-item{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--k-border);}
.fluxo-item:last-child{border-bottom:none;}
.fluxo-desc{font-size:12px;color:var(--k-cream);}
.fluxo-hora{font-size:10px;color:var(--k-muted);margin-top:1px;}
.fluxo-val{font-family:var(--font-display);font-size:16px;}
.fluxo-val.entrada{color:#5DBF78;}
.fluxo-val.saida{color:#CF6060;}
.assin-row{display:flex;align-items:center;gap:10px;padding:.6rem 0;border-bottom:1px solid var(--k-border);}
.assin-row:last-child{border-bottom:none;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--k-dark);border:1px solid var(--k-border);border-radius:14px;width:100%;max-width:420px;padding:1.3rem;max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;align-items:center;gap:9px;margin-bottom:1rem;}
.modal-head img{width:42px;height:42px;object-fit:contain;}
.modal-title{font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--k-gold);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
textarea.form-input{resize:vertical;min-height:65px;}
.divider{height:1px;background:var(--k-border);margin:.85rem 0;}
.empty{text-align:center;padding:2rem 1rem;color:var(--k-muted);}
.empty i{font-size:34px;opacity:.3;display:block;margin-bottom:.55rem;}
.empty p{font-size:12px;}
.scroll-list{max-height:290px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--k-border) transparent;}
.minha-assin{background:linear-gradient(135deg,#1A1200,#2A1E00);border:1px solid var(--k-gold-dim);border-radius:12px;padding:1.2rem;margin-bottom:1rem;}
.minha-assin-nome{font-family:var(--font-display);font-size:22px;color:var(--k-gold);}
.minha-assin-info{font-size:12px;color:var(--k-muted);margin-top:4px;}
.minha-assin-item{font-size:12px;color:var(--k-cream);padding:3px 0;display:flex;align-items:center;gap:6px;}
.minha-assin-item i{color:var(--k-gold);font-size:12px;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--k-gold);color:#0D0D0D;padding:.6rem 1.1rem;border-radius:8px;font-size:12px;font-weight:600;z-index:300;display:none;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ── CADASTRO ── */
.tab-row{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(--k-border);}
.tab-btn{flex:1;background:none;border:none;color:var(--k-muted);font-family:var(--font-ui);font-size:13px;font-weight:600;padding:.75rem;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;position:relative;z-index:10;}
.tab-btn.active{color:var(--k-gold);border-bottom-color:var(--k-gold);}

/* ── PLANO SELEÇÃO PÓS-CADASTRO ── */
#plan-select-screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:1.5rem;background:var(--k-black);}
#plan-select-screen.visible{display:flex;}
.plan-select-box{width:100%;max-width:700px;}
.plan-select-title{font-family:var(--font-display);font-size:26px;letter-spacing:3px;color:var(--k-gold);text-align:center;margin-bottom:.4rem;}
.plan-select-sub{font-size:13px;color:var(--k-muted);text-align:center;margin-bottom:1.5rem;}
.plan-select-logo{display:flex;justify-content:center;margin-bottom:1.2rem;}
.plan-select-logo img{width:80px;height:80px;object-fit:contain;}
.skip-link{display:block;text-align:center;margin-top:1rem;font-size:12px;color:var(--k-muted);cursor:pointer;text-decoration:underline;}
.skip-link:hover{color:var(--k-cream);}

/* ── MESES SELECTOR ── */
.meses-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:1rem 0;}
.mes-btn{background:var(--k-card);border:1px solid var(--k-border);border-radius:8px;padding:.6rem;text-align:center;cursor:pointer;transition:.2s;}
.mes-btn:hover,.mes-btn.active{border-color:var(--k-gold);background:rgba(201,168,76,.1);}
.mes-btn-num{font-family:var(--font-display);font-size:22px;color:var(--k-gold);}
.mes-btn-label{font-size:10px;color:var(--k-muted);margin-top:2px;}
.mes-btn-desc{font-size:11px;color:var(--k-cream);margin-top:3px;font-weight:500;}

/* ── CHAT PIX ── */
#chat-screen{display:none;min-height:100vh;flex-direction:column;background:var(--k-black);}
#chat-screen.visible{display:flex;}
.chat-header{background:var(--k-dark);border-bottom:1px solid var(--k-border);padding:.9rem 1.25rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.chat-header img{width:36px;height:36px;object-fit:contain;}
.chat-header-info{flex:1;}
.chat-header-title{font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--k-gold);}
.chat-header-sub{font-size:11px;color:var(--k-muted);}
.chat-back{background:none;border:none;color:var(--k-muted);cursor:pointer;font-size:20px;padding:4px;}
.chat-back:hover{color:var(--k-gold);}
.chat-body{flex:1;padding:1rem 1.25rem;overflow-y:auto;max-width:700px;margin:0 auto;width:100%;}
.chat-msg{display:flex;flex-direction:column;margin-bottom:.75rem;max-width:80%;}
.chat-msg.system{align-self:center;max-width:90%;text-align:center;}
.chat-msg.kjota{align-self:flex-start;}
.chat-msg.cliente{align-self:flex-end;}
.chat-bubble{padding:.65rem .9rem;border-radius:12px;font-size:13px;line-height:1.5;}
.chat-msg.kjota .chat-bubble{background:var(--k-dark);border:1px solid var(--k-border);color:var(--k-cream);border-radius:12px 12px 12px 2px;}
.chat-msg.cliente .chat-bubble{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--k-cream);border-radius:12px 12px 2px 12px;}
.chat-msg.system .chat-bubble{background:rgba(42,107,58,.2);border:1px solid #2A6B3A;color:#5DBF78;font-size:12px;font-weight:600;border-radius:8px;}
.chat-msg.system.warn .chat-bubble{background:rgba(139,26,26,.2);border-color:#8B1A1A;color:#CF6060;}
.chat-time{font-size:10px;color:var(--k-muted);margin-top:3px;padding:0 4px;}
.chat-msg.cliente .chat-time{text-align:right;}
.pix-box{background:linear-gradient(135deg,#1A1200,#2A1E00);border:1px solid var(--k-gold-dim);border-radius:10px;padding:1rem;margin:.5rem 0;}
.pix-key{font-family:var(--font-display);font-size:18px;color:var(--k-gold);letter-spacing:1px;margin:.3rem 0;}
.pix-copy{display:inline-flex;align-items:center;gap:4px;background:var(--k-gold);color:#0D0D0D;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-top:.4rem;}
.pix-copy:hover{background:#D9B85C;}
.chat-footer{background:var(--k-dark);border-top:1px solid var(--k-border);padding:.85rem 1.25rem;max-width:700px;margin:0 auto;width:100%;}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-input{flex:1;background:var(--k-card);border:1px solid var(--k-border);border-radius:10px;padding:.6rem .85rem;color:var(--k-cream);font-family:var(--font-ui);font-size:13px;outline:none;resize:none;min-height:40px;max-height:100px;}
.chat-input:focus{border-color:var(--k-gold);}
.chat-send{background:var(--k-gold);border:none;border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.chat-send:hover{background:#D9B85C;}
.chat-send i{font-size:16px;color:#0D0D0D;}
.chat-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.6rem;}
.chat-action-btn{background:var(--k-card);border:1px solid var(--k-border);border-radius:6px;padding:.3rem .7rem;font-size:11px;color:var(--k-muted);cursor:pointer;font-family:var(--font-ui);}
.chat-action-btn:hover{border-color:var(--k-gold);color:var(--k-gold);}

/* ── ADMIN CHATS ── */
.chat-list-item{display:flex;align-items:center;gap:10px;padding:.7rem 0;border-bottom:1px solid var(--k-border);cursor:pointer;transition:.15s;}
.chat-list-item:hover{background:rgba(201,168,76,.04);margin:0 -1rem;padding:0.7rem 1rem;}
.chat-list-item:last-child{border-bottom:none;}
.chat-list-av{width:38px;height:38px;border-radius:50%;background:var(--k-gold-dim);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;color:var(--k-cream);flex-shrink:0;}
.chat-list-info{flex:1;}
.chat-list-name{font-size:13px;font-weight:500;color:var(--k-cream);}
.chat-list-preview{font-size:11px;color:var(--k-muted);margin-top:2px;}
.chat-unread{background:var(--k-gold);color:#0D0D0D;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.badge-pend{background:#2A2000;color:#C9A84C;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.badge-conf{background:#0A2A12;color:#5DBF78;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}

/* ── VENCIMENTO ── */
.venc-warn{background:rgba(139,26,26,.2);border:1px solid #8B1A1A;border-radius:10px;padding:.9rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
.venc-ok{background:rgba(42,107,58,.15);border:1px solid #2A6B3A;border-radius:10px;padding:.9rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}

/* ── CONFIGURAÇÕES ── */
.config-section{margin-bottom:1.5rem;}
.config-section-title{font-family:var(--font-display);font-size:16px;letter-spacing:2px;color:var(--k-gold);margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.config-section-title i{font-size:18px;}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.config-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.horario-row{display:flex;align-items:center;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--k-border);}
.horario-row:last-child{border-bottom:none;}
.horario-dia{font-size:13px;font-weight:500;color:var(--k-cream);width:90px;flex-shrink:0;}
.horario-toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.horario-toggle input{opacity:0;width:0;height:0;}
.horario-slider{position:absolute;inset:0;background:var(--k-border);border-radius:20px;cursor:pointer;transition:.2s;}
.horario-toggle input:checked + .horario-slider{background:var(--k-gold);}
.horario-slider:before{content:"";position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.horario-toggle input:checked + .horario-slider:before{transform:translateX(16px);}
.horario-inputs{display:flex;align-items:center;gap:6px;flex:1;}
